name: CI / CD

on:
  push:
    branches: [main]
    paths:
      - 'dashboards/**'
      - 'prometheus/**'
      - 'alertmanager/**'
      - 'scripts/**'
      - '.github/workflows/deploy.yml'
  pull_request:
    branches: ['**']
    paths:
      - 'dashboards/**'
      - 'prometheus/**'
      - 'alertmanager/**'
      - 'scripts/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

jobs:
  validate:
    name: Validate Configurations
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            prometheus:
              - 'prometheus/**'
            alertmanager:
              - 'alertmanager/**'
            dashboards:
              - 'dashboards/**'

      - name: Validate Prometheus Configuration
        if: steps.filter.outputs.prometheus == 'true'
        run: |
          echo "Validating prometheus.yml..."
          docker run --rm --entrypoint promtool -v ${{ github.workspace }}/prometheus:/prometheus prom/prometheus check config /prometheus/prometheus.yml
          echo "Validating alerts.yml..."
          docker run --rm --entrypoint promtool -v ${{ github.workspace }}/prometheus:/prometheus prom/prometheus check rules /prometheus/alerts.yml

      - name: Validate Alertmanager Configuration
        if: steps.filter.outputs.alertmanager == 'true'
        run: |
          echo "Validating alertmanager.yml..."
          # Substitute env variable placeholders with dummy values for syntax testing
          sed -e 's/\$[{]TELEGRAM_BOT_TOKEN[}]/123456:ABC/g' -e 's/\$[{]TELEGRAM_CHAT_ID[}]/123456789/g' alertmanager/alertmanager.yml > alertmanager/alertmanager.temp.yml
          docker run --rm --entrypoint amtool -v ${{ github.workspace }}/alertmanager:/alertmanager prom/alertmanager check-config /alertmanager/alertmanager.temp.yml
          rm alertmanager/alertmanager.temp.yml

      - name: Validate Grafana Dashboards JSON
        if: steps.filter.outputs.dashboards == 'true'
        run: |
          echo "Checking JSON syntax for Grafana dashboards..."
          for f in dashboards/*.json; do
            [ -f "$f" ] || continue
            jq '.' "$f" > /dev/null
          done

  deploy-dashboards:
    name: Deploy Dashboards
    needs: validate
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Get EasyCasual folder
        id: folder
        env:
          GH_TOKEN: ${{ secrets.GRAFANA_API_TOKEN }}
          GRAFANA_URL: ${{ vars.GRAFANA_URL || 'https://grafana.easycasual.app' }}
        run: |
          # shellcheck disable=SC2016
          # The EasyCasual folder is created here if it does not exist.
          # Using -k because of SSL issues with the internal Grafana URL.
          RESPONSE=$(curl -s -k -H "Authorization: Bearer $GH_TOKEN" "$GRAFANA_URL/api/folders")
          
          # Check if RESPONSE is a valid JSON array
          if ! echo "$RESPONSE" | jq -e 'if type == "array" then . else empty end' > /dev/null 2>&1; then
            echo "Error: Unexpected response from Grafana API: $RESPONSE"
            exit 1
          fi

          FOLDER_ID=$(echo "$RESPONSE" | jq -r '.[] | select(.uid=="easycasual") | .id')
          
          if [ -z "$FOLDER_ID" ] || [ "$FOLDER_ID" = "null" ]; then
            echo "Creating EasyCasual folder (provisioning may not have run yet)..."
            RESULT=$(curl -s -k -X POST \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Content-Type: application/json" \
              -d '{"name":"EasyCasual","uid":"easycasual"}' \
              "$GRAFANA_URL/api/folders")
            
            # Check for creation error
            if echo "$RESULT" | jq -e '.id == null' > /dev/null 2>&1; then
              echo "Error creating folder: $RESULT"
              exit 1
            fi
            FOLDER_ID=$(echo "$RESULT" | jq .id)
          fi
          echo "id=$FOLDER_ID" >> "$GITHUB_OUTPUT"

      - name: Import dashboards
        env:
          GH_TOKEN: ${{ secrets.GRAFANA_API_TOKEN }}
          GRAFANA_URL: ${{ vars.GRAFANA_URL || 'https://grafana.easycasual.app' }}
        run: |
          # shellcheck disable=SC2016
          for f in dashboards/*.json; do
            [ -f "$f" ] || continue
            echo "Importing $(basename "$f")..."
            # Fix datasource: replace template variable ${datasource} with our actual UID
            FIXED=$(sed 's/"uid": "\${datasource}"/"uid": "prometheus-scrapper"/g' "$f")
            PAYLOAD=$(jq -n \
                --argjson d "$FIXED" \
                --argjson fid "${{ steps.folder.outputs.id }}" \
                '{"dashboard":$d,"folderId":$fid,"overwrite":true}')
            curl -s -k -X POST \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Content-Type: application/json" \
              -d "$PAYLOAD" \
              "$GRAFANA_URL/api/dashboards/db" | jq -r '"Result: \(.message // "OK")"'
          done
